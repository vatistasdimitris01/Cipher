      <path d="M11 20h.01" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M15 20h.01" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M19 20h.01" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 12a10 10 0 0 0-13-9.54" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 7a5 5 0 0 0-5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 7a5 5 0 0 1 5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
