      <path d="M17 12a5 5 0 0 1-5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M7 12a5 5 0 0 0 5 5" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M2 12h.01" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 12h.01" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    
    <!-- Text -->
    <text x="-120" y="55" font-family="sans-serif" font-size="160" font-weight="700" letter-spacing="-0.04em" fill="white">Cipher</text>
